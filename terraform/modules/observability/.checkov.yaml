---
# Observability module checkov suppressions.
#
# Inline #checkov:skip annotations are not honoured by checkov 3.2.x on Windows
# (established in T-004); this file is the operational suppression mechanism.

skip-check:
  - CKV_AWS_158   # CloudWatch log group encrypted with CMK - Phase 1 hard rule #3 (no CMKs). All four log groups use AWS-managed aws/logs encryption. Phase 2 may add aws/logs CMK.
  - CKV_AWS_338   # CloudWatch log group retention < 1 year - 30-day retention is deliberate Phase 1 cost stance per requirements §4 / design.md §3. Extended retention deferred to Phase 2 compliance review.
  - CKV2_AWS_34   # SSM parameter not encrypted - CW Agent config (type=String) contains no secrets; only metric collection intervals and log file paths. SecureString would require kms:Decrypt on the EC2 instance role for zero security benefit. Phase 2 may add SecureString if sensitive endpoints are added.
  - CKV_AWS_337   # Same intent as CKV2_AWS_34 above; different checkov versions surface different rule IDs for SSM parameter encryption. Both suppressed for the same reason: parameter is type=String with no secrets (CW Agent config - metric paths and intervals). SecureString would require kms:Decrypt on the EC2 instance role for zero security benefit.
  - CKV_AWS_18    # S3 access logging on canary-artifacts bucket - Phase 1 cost stance; canary writes are internal and audited via CloudTrail. Access logs only meaningful at production scale.
  - CKV_AWS_144   # S3 cross-region replication on canary-artifacts bucket - Phase 1 single-region; canary artifacts are ephemeral (30-day lifecycle expiry); no DR concern.
  - CKV_AWS_145   # S3 KMS encryption on canary-artifacts bucket - Phase 1 hard rule #3 (no CMKs). Bucket uses SSE-S3 (AES256). Phase 2 may add CMK.
  - CKV2_AWS_62   # S3 event notifications on canary-artifacts bucket - internal write-only artifact storage; event notifications add no operational value at Phase 1 scale.
