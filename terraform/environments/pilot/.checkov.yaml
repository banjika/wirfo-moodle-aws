---
# Workload-root checkov suppressions for the pilot environment.
#
# Mirrors module-level .checkov.yaml suppressions so checkov's
# transitive scan from the workload root applies the same skips as
# module-only scans. When adding a new module, add the same suppressions
# here as in the module's own .checkov.yaml.
#
# Inline #checkov:skip annotations are not honoured by checkov 3.2.x
# on Windows (established in T-004); the .checkov.yaml is the
# operational mechanism.

skip-check:
  - CKV_AWS_130   # modules/network - public subnets auto-assign public IPs per CLAUDE.md hard rule #1 (no NAT). Permanent Phase 1 stance.
  - CKV_AWS_158   # modules/network + modules/observability - CloudWatch Log Groups use aws/logs (no CMK) per CLAUDE.md hard rule #3. Permanent Phase 1 stance.
  - CKV_AWS_338   # modules/network + modules/observability - Log group retention < 1 year; deliberate Phase 1 cost decision (14-day flow logs, 30-day app logs). CloudTrail (90-day object-lock COMPLIANCE) covers audit needs. Phase 2 may revisit.
  - CKV2_AWS_5    # modules/security - SGs are declared here; attached to resources in T-014 (RDS), T-015 (cache), T-016 (EFS), T-018 (EC2). Permanent Phase 1 stance.
  - CKV_AWS_260   # modules/security - web_sg port 80 ingress uses CloudFront managed prefix list (data.aws_ec2_managed_prefix_list.cloudfront_origin), not 0.0.0.0/0. Checkov pattern doesn't inspect prefix_list_id source on aws_vpc_security_group_ingress_rule. CLAUDE.md hard rule #7. Permanent.
  - CKV_AWS_149   # modules/security - Secrets Manager no CMK in Phase 1 per CLAUDE.md hard rule #3; uses aws/secretsmanager default key. CMK deferred to Phase 2 for payment data isolation.
  - CKV_AWS_290   # modules/security - moodle_ec2_efs_client policy: EFS Resource=* required because security module cannot import EFS ARN without dependency cycle. Effective scoping enforced by EFS file_system_policy in modules/storage which restricts mount to this exact role ARN.
  - CKV_AWS_355   # modules/security - moodle_ec2_efs_client policy: same root cause as CKV_AWS_290. Four ClientMount-family actions are themselves narrowly scoped; only Resource is wildcard, intentionally.
  - CKV2_AWS_57   # modules/security - Secrets Manager auto-rotation deferred to Phase 2 per requirements §2.1; requires VPC-attached Lambda + Interface VPC Endpoint, contradicting Phase 1 no-NAT cost stance.
  - CKV_AWS_157   # modules/data - Phase 1 single-AZ per CLAUDE.md hard rule #2; var.rds_multi_az flips this in Phase 3.
  - CKV_AWS_118   # modules/data - Enhanced monitoring deferred to Phase 2; requires monitoring.rds.amazonaws.com IAM role + monitoring_interval > 0. Performance Insights covers Phase 1.
  - CKV_AWS_161   # modules/data - IAM DB auth deferred to Phase 3 per design.md §2.4; db_resource_id exported for eventual modules/compute IAM policy.
  - CKV_AWS_354   # modules/data - Performance Insights uses aws/rds default key; no CMK in Phase 1 per CLAUDE.md hard rule #3. CMK introduced in Phase 2.
  - CKV_AWS_191   # modules/cache - ElastiCache replication group uses aws/elasticache default key; no CMK in Phase 1 per CLAUDE.md hard rule #3. CMK deferred to Phase 2.
  - CKV2_AWS_50   # modules/cache - Multi-AZ Automatic Failover disabled; Phase 1 single-AZ per CLAUDE.md hard rule #2. Phase 3 enables HA via cache_cluster_mode toggle.
  - CKV_AWS_184   # modules/storage - EFS uses aws/elasticfilesystem default key; no CMK in Phase 1 per CLAUDE.md hard rule #3. CMK introduced in Phase 2 for payment data isolation.
  - CKV_AWS_166   # modules/storage - Backup vault uses aws/backup AWS-managed key; no CMK in Phase 1 per CLAUDE.md hard rule #3 and design.md §10 row 3. CMK introduced in Phase 2 alongside payment data isolation.
  - CKV2_AWS_18   # modules/storage - EFS IS covered by T-017 tag-based aws_backup_selection (BackupPolicy=daily-7d); checkov static analysis cannot resolve cross-resource tag-based selection references.
  - CKV_AWS_88    # modules/compute - EC2 has public IP per CLAUDE.md hard rule #1 (no NAT). Web SG ingress restricted to CloudFront prefix list (T-011); admin via SSM only (hard rule #6). Phase 3 moves EC2 behind ALB into private subnets.
  - CKV_AWS_126   # modules/compute - EC2 detailed monitoring disabled; Phase 1 cost stance per requirements §6. CloudWatch Agent (T-022) provides 1-minute app-level metrics.
  - CKV_AWS_68    # modules/dns_cdn - CloudFront WAF deferred to Phase 2 alongside payment gateway integration per design.md §10.1.
  - CKV_AWS_86    # modules/dns_cdn - CloudFront access logging omitted; Phase 1 cost stance per design.md §2.7. Phase 2 may add S3 logging when WAF analytics need it.
  - CKV_AWS_305   # modules/dns_cdn - CloudFront default_root_object intentionally empty; Moodle handles URL routing. Setting "index.php" breaks /login/index.php, /course/view.php, etc.
  - CKV_AWS_310   # modules/dns_cdn - CloudFront origin failover not applicable; single EC2 origin in Phase 1. Phase 3 introduces ALB and HA per design.md §10.1.
  - CKV_AWS_374   # modules/dns_cdn - CloudFront geo restriction none; no geo-blocking in Phase 1 per CLAUDE.md hard rule #5. Phase 2 BNR REG 89/2025 may add pricing variation, not geo-blocking.
  - CKV2_AWS_32   # modules/dns_cdn - CloudFront response headers policy not in Phase 1 scope. Phase 2 may add HSTS/CSP security headers policy for production hardening.
  - CKV2_AWS_47   # modules/dns_cdn - CloudFront WAFv2 Log4j AMR requires WAF attachment; deferred to Phase 2 with CKV_AWS_68.
  - CKV2_AWS_34   # modules/observability - SSM parameter /moodle/cloudwatch-agent/config is type=String (no secrets; only metric intervals and log paths). SecureString would require kms:Decrypt on the EC2 instance role for zero security benefit. Phase 2 may add SecureString if sensitive endpoints are added.
  - CKV_AWS_337   # modules/observability - Same intent as CKV2_AWS_34 above; different checkov versions surface different rule IDs for SSM parameter encryption. Both suppressed for the same reason: parameter is type=String with no secrets (CW Agent config - metric paths and intervals). SecureString would require kms:Decrypt on the EC2 instance role for zero security benefit.
  - CKV_AWS_18    # modules/observability - S3 access logging on canary-artifacts bucket; Phase 1 cost stance. Canary writes are internal and audited via CloudTrail. Access logs only meaningful at production scale.
  - CKV_AWS_144   # modules/observability - S3 cross-region replication on canary-artifacts bucket; Phase 1 single-region. Canary artifacts are ephemeral (30-day lifecycle expiry); no DR concern.
  - CKV_AWS_145   # modules/observability - S3 KMS encryption on canary-artifacts bucket; Phase 1 hard rule #3 (no CMKs). Bucket uses SSE-S3 (AES256). Phase 2 may add CMK.
  - CKV2_AWS_62   # modules/observability - S3 event notifications on canary-artifacts bucket; internal write-only artifact storage. Event notifications add no operational value at Phase 1 scale.
  - CKV2_AWS_58   # environments/pilot/guardduty.tf - GuardDuty S3 protection uses account default. Enabling explicitly requires aws_guardduty_detector_feature per region (17 extra resources). Phase 2 enables via delegated admin.
  - CKV2_AWS_3    # environments/pilot/guardduty.tf - Rule requires GuardDuty wired to an AWS Organizations delegated admin account. Phase 1 is a single-account deployment with no AWS Organizations. Org-level GuardDuty is a Phase 2 multi-account concern per design.md §2.8.
  
